        function renderFoodTable(filterValue = 'е…ЁйғЁ') {
            const tbody = document.getElementById('food-tbody');
            tbody.innerHTML = '';

            foodData.forEach(item => {
                // еҰӮжһңдёҚжҳҜйҒёе…ЁйғЁпјҢдё”и©ІйЈҹзү©ж•ҲжһңдёҚеҢ…еҗ«й»һйҒёзҡ„й—ңйҚөеӯ—пјҢе°ұpassдёҚжёІжҹ“
                if (filterValue !== 'е…ЁйғЁ' && !item.effectType.includes(filterValue)) {
                    return; 
                }

                const typeClass = item.type === 'з§ҒжҲҝиҸң' ? 'text-gold' : '';
                const displayEffectType = item.effectType || '-';
                const displayEffect = item.effect || '-';
                const displayDuration = item.duration || '-';
                const displayCost = item.cost || '-';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.npc}</td>
                    <td class="${typeClass}">${item.type}</td>
                    <td>${item.name}</td>
                    <td>${displayEffectType}</td>
                    <td>${displayEffect}</td>
                    <td>${displayDuration}</td>
                    <td>${displayCost}</td>
                    <td><span class="badge badge-loc">${item.loc}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // й»һж“ҠзҜ©йҒёжҢүйҲ•еҫҢи§ёзҷјдәӢд»¶
        function filterFood(type, btnElement) {
            // еҲҮжҸӣжҢүйҲ•жЁЈејҸ
            document.querySelectorAll('#foodPage .filter-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            
            // йҮҚж–°жёІжҹ“иЎЁж ј
            renderFoodTable(type);
        }
